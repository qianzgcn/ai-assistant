# Docker Compose configuration for AI Assistant Server
version: '3.8'

services:
  # AI Assistant Backend Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-assistant-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_DEFAULT_MODEL=${OPENAI_DEFAULT_MODEL:-gpt-4o-mini}
      - DATABASE_URL=sqlite+aiosqlite:///./data/ai_assistant.db
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}
    volumes:
      # Persist SQLite database
      - server_data:/app/data
      # Optional: mount for development
      # - ./app:/app/app:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge

volumes:
  server_data:
    driver: local
