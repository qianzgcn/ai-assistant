name: Deploy To Tencent CVM

on:
  # 仅在 main 分支收到 push 时自动部署。
  push:
    branches:
      - main

# 这个工作流只需要读取仓库代码，不需要额外的写权限。
permissions:
  contents: read

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest

    # 这里的 workflow 放在顶层仓库，但真正的前端项目在 ai-assistant-web 子目录里。
    # 因此我们把常量集中定义，后续所有路径都基于这个子目录展开。
    env:
      PROJECT_DIR: ai-assistant-web
      NODE_VERSION: '20.19.5'
      ARCHIVE_NAME: web-dist.tar.gz
      RELEASE_NAME: ${{ github.sha }}
      KEEP_RELEASES: ${{ secrets.KEEP_RELEASES }}

    # 默认把 run 命令放到前端子目录内执行。
    # 这样 npm ci / lint / test / build 都会在 ai-assistant-web 中运行。
    defaults:
      run:
        working-directory: ai-assistant-web

    steps:
      # 第一步：拉取整个顶层仓库代码。GitHub 只会识别根目录 .github/workflows 下的工作流。
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第二步：安装固定版本的 Node，确保本地和 CI 的行为尽可能一致。
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ai-assistant-web/package-lock.json

      # 第三步：安装依赖。这里使用 ai-assistant-web/package-lock.json。
      - name: Install dependencies
        run: npm ci

      # 第四步：先做静态检查。这里失败说明代码质量或类型约束未通过，不会继续部署。
      - name: Run lint
        run: npm run lint

      # 第五步：执行测试。这里失败说明现有功能可能被破坏，也不会继续部署。
      - name: Run tests
        run: npm test

      # 第六步：构建生产产物。Vite 会在 ai-assistant-web/dist 目录下生成可部署的静态文件。
      - name: Build project
        run: npm run build

      # 第七步：把 ai-assistant-web/dist 目录压缩成一个归档文件，方便后续通过 scp 一次性上传。
      - name: Archive dist
        run: tar -czf "${ARCHIVE_NAME}" -C dist .

      # 第八步：准备 SSH 私钥和 known_hosts。
      # 这里不依赖第三方 SSH Action，而是直接使用 runner 自带的 ssh/scp 命令。
      - name: Prepare SSH client
        shell: bash
        working-directory: .
        run: |
          set -Eeuo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 将 GitHub Secrets 里的私钥写入 runner。
          printf '%s\n' "${{ secrets.TENCENT_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # 提前把服务器指纹写入 known_hosts，避免首次连接时交互确认。
          ssh-keyscan -p "${{ secrets.TENCENT_PORT }}" "${{ secrets.TENCENT_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # 第九步：先远程创建部署目录。
      # 这么做是为了确保后续 scp 上传时目标目录一定存在。
      - name: Prepare remote directories
        shell: bash
        working-directory: .
        run: |
          set -Eeuo pipefail

          ssh -p "${{ secrets.TENCENT_PORT }}" "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}/tmp' '${{ secrets.DEPLOY_PATH }}/releases' '${{ secrets.DEPLOY_PATH }}/shared'"

      # 第十步：上传构建产物和远程部署脚本。
      # 注意：workflow 在仓库根目录，但脚本真实路径位于 ai-assistant-web/scripts/deploy。
      - name: Upload artifact and deploy script
        shell: bash
        working-directory: .
        run: |
          set -Eeuo pipefail

          scp -P "${{ secrets.TENCENT_PORT }}" "${{ env.PROJECT_DIR }}/${ARCHIVE_NAME}" \
            "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}:${{ secrets.DEPLOY_PATH }}/tmp/${ARCHIVE_NAME}"

          scp -P "${{ secrets.TENCENT_PORT }}" "${{ env.PROJECT_DIR }}/scripts/deploy/remote-release.sh" \
            "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}:${{ secrets.DEPLOY_PATH }}/tmp/remote-release.sh"

      # 第十一步：在服务器上执行远程部署脚本。
      # 这里不会在服务器上构建前端，只是解压 dist、切换 current、reload Nginx。
      - name: Execute remote release script
        shell: bash
        working-directory: .
        run: |
          set -Eeuo pipefail

          ssh -p "${{ secrets.TENCENT_PORT }}" "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" <<EOF
          set -Eeuo pipefail
          chmod +x '${{ secrets.DEPLOY_PATH }}/tmp/remote-release.sh'
          DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' \
          RELEASE_NAME='${RELEASE_NAME}' \
          ARCHIVE_NAME='${ARCHIVE_NAME}' \
          NGINX_CONTAINER_NAME='${{ secrets.NGINX_CONTAINER_NAME }}' \
          KEEP_RELEASES='${KEEP_RELEASES}' \
          bash '${{ secrets.DEPLOY_PATH }}/tmp/remote-release.sh'
          EOF
